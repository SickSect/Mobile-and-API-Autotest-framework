# ? Cloud Provider Settings
cloud.provider=lambdatest
cloud.username=${LT_USERNAME}
cloud.accessKey=${LT_ACCESS_KEY}
cloud.hub=https://hub.lambdatest.com/wd/hub

# ? Device Configuration
cloud.deviceName=Pixel 5
cloud.platformVersion=11
cloud.platformName=Android
cloud.automationName=UiAutomator2

# ? Pre-installed App
cloud.appPackage=io.appium.android.apis
cloud.appActivity=.ApiDemos

# ? Session Settings
cloud.build=Mobile-Login-Flow-Testing-Example
cloud.projectName=ApiDemos Tests
cloud.w3c=true
cloud.noReset=false

# ? Timeouts
cloud.implicitWait=15
cloud.explicitWait=30